<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Jeux</title>
<style>
  :root {
    --bg: #0d1b2a;
    --panel: #13293d;
    --sea-line: #234a6b;
    --accent: #38bdf8;
    --snake: #34d399;
    --text: #e6f1ff;
    --muted: #8ea9c1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: radial-gradient(circle at 30% 10%, #1b3a54, var(--bg));
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 16px;
  }
  header { text-align: center; margin-bottom: 32px; }
  h1 {
    font-size: clamp(2rem, 7vw, 3rem); letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--snake));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: .95rem; margin-top: 8px; }

  .games {
    display: flex; flex-wrap: wrap; gap: 22px; justify-content: center; width: 100%; max-width: 720px;
  }
  .game-card {
    flex: 1 1 260px; max-width: 320px;
    background: var(--panel); border: 1px solid var(--sea-line);
    border-radius: 20px; padding: 30px 24px; text-align: center;
    text-decoration: none; color: var(--text);
    box-shadow: 0 8px 30px rgba(0,0,0,.35);
    transition: transform .15s, border-color .15s, box-shadow .15s;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 40px rgba(0,0,0,.45);
  }
  .game-card.navy:hover { border-color: var(--accent); }
  .game-card.snake:hover { border-color: var(--snake); }
  .game-card .emoji { font-size: 3.4rem; line-height: 1; }
  .game-card h2 { font-size: 1.35rem; letter-spacing: 1px; }
  .game-card p { color: var(--muted); font-size: .85rem; line-height: 1.4; }
  .game-card .play {
    margin-top: 8px; font-weight: 700; font-size: .9rem;
    padding: 9px 20px; border-radius: 10px;
  }
  .navy .play { background: linear-gradient(135deg, var(--accent), #0ea5e9); color: #04263b; }
  .snake .play { background: linear-gradient(135deg, var(--snake), #10b981); color: #04261a; }

  footer { margin-top: 40px; color: var(--muted); font-size: .78rem; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Mes Jeux</h1>
  <div class="subtitle">Choisis un jeu et amuse-toi 🎮</div>
</header>

<div class="games">
  <a class="game-card navy" href="bataille-navale.html">
    <div class="emoji">🚢</div>
    <h2>Bataille Navale</h2>
    <p>Coule la flotte adverse. Contre l'ordinateur (3 niveaux) ou à 2 joueurs.</p>
    <span class="play">Jouer →</span>
  </a>

  <a class="game-card snake" href="snake.html">
    <div class="emoji">🐍</div>
    <h2>Snake</h2>
    <p>Mange les pommes, grandis et bats ton record sans te mordre la queue.</p>
    <span class="play">Jouer →</span>
  </a>
</div>

<footer>Des jeux dans le navigateur — aucune installation nécessaire.</footer>
</body>
</html>
